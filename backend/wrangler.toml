name = "hp-container-system-api"
main = "workers/index.ts"
compatibility_date = "2025-01-15"

[vars]
APP_ENV = "local"
ALLOWED_ORIGIN = "http://localhost:3000"
SCHOOL_TIMEZONE = "Asia/Jakarta"
REGULAR_IN_ALLOWED_START = "06:30"
REGULAR_IN_ALLOWED_END = "07:30"
REGULAR_OUT_ALLOWED_TIME = "12:30"
CONTAINER_CACHE_TTL_SECONDS = "90"
DASHBOARD_CACHE_TTL_SECONDS = "10"

[[r2_buckets]]
binding = "AUDIT_ARCHIVE"
bucket_name = "hp-container-audit-archive"

[triggers]
crons = ["0 2 * * *", "0 8 * * 1", "0 8 * * *"] # 2 AM Archive, 8 AM Monday Reports, 8 AM Daily Violations

[env.staging]
name = "hp-container-system-api-staging"

[env.staging.vars]
APP_ENV = "staging"
ALLOWED_ORIGIN = "https://hp-container-system-staging.pages.dev"
SCHOOL_TIMEZONE = "Asia/Jakarta"
REGULAR_IN_ALLOWED_START = "06:30"
REGULAR_IN_ALLOWED_END = "07:30"
REGULAR_OUT_ALLOWED_TIME = "12:30"
CONTAINER_CACHE_TTL_SECONDS = "90"
DASHBOARD_CACHE_TTL_SECONDS = "10"

[env.production]
name = "hp-container-system-api-production"

[env.production.vars]
APP_ENV = "production"
ALLOWED_ORIGIN = "https://hp-container-system-production.pages.dev"
SCHOOL_TIMEZONE = "Asia/Jakarta"
REGULAR_IN_ALLOWED_START = "06:30"
REGULAR_IN_ALLOWED_END = "07:30"
REGULAR_OUT_ALLOWED_TIME = "12:30"
CONTAINER_CACHE_TTL_SECONDS = "90"
DASHBOARD_CACHE_TTL_SECONDS = "10"
